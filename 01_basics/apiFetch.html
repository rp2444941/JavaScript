<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API Project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        #posts {
            margin-top: 20px;
        }
        .post {
            background: #f4f4f4;
            margin: 10px 0;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #007bff;
        }
        .post h3 {
            margin-top: 0;
            color: #333;
        }
        .post p {
            margin-bottom: 0;
            color: #666;
        }
        .loading {
            text-align: center;
            color: #007bff;
        }
        .error {
            color: red;
            text-align: center;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Fetch API Example</h1>
    <button id="fetchButton">Fetch Posts</button>
    <div id="posts"></div>

    <script>
        const fetchButton=document.getElementById('fetchButton');
        const postsDiv=document.getElementById('posts');

        fetchButton.addEventListener('click',fetchPosts);

        async function fetchPosts(){
            //show loading indicator
            postsDiv.innerHTML='<p class="loading">Loading posts...<p>';
                try{
                           // Fetch data from JSONPlaceholder API
                            const response = await fetch('https://jsonplaceholder.typicode.com/posts?_limit=5');
                            // Check if response is OK (status 200-299)
                             if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const posts = await response.json();
                
                // Display the posts
                displayPosts(posts);

                }catch (error) {
                // Handle errors (network issues, invalid JSON, etc.)
                postsDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }

        function displayPosts(posts) {
            if (posts.length === 0) {
                postsDiv.innerHTML = '<p>No posts found.</p>';
                return;
            } 
              // Build HTML for each post
            let html = '';
            posts.forEach(post => {
                html += `
                    <div class="post">
                        <h3>${post.title}</h3>
                        <p>${post.body}</p>
                    </div>
                `;
            });
            postsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
