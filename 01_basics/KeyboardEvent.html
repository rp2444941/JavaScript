<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Event</title>
     <style>
    #display {
      font-size: 100px;
      text-align: center;
      margin-top: 100px;
    }
  </style>
</head>
<body>
      <h1 style="text-align: center;">Press Any Key</h1>
  <div id="display">?</div>
  <script>
    const display=document.querySelector("#display");
    document.addEventListener('keypress',function(event){
        display.innerHTML=event.key;
    });
  </script>

</body>
</html>
